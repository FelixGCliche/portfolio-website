name: Run Checks
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  run-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Check Lint
        run: bun run check:lint

      - name: Check Format
        run: bun run check:format

      - name: Check Type
        run: bun run check:type
